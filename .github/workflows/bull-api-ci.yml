name: Bull API CI

on:
  push:
    branches: ["main"]
    paths:
      - "BullAPI/**"
      - "Rust/core/**"
      - ".dockerignore"
      - ".github/workflows/bull-api-ci.yml"
      - ".github/workflows/bull-api-docker.yml"
  pull_request:
    paths:
      - "BullAPI/**"
      - "Rust/core/**"
      - ".dockerignore"
      - ".github/workflows/bull-api-ci.yml"
      - ".github/workflows/bull-api-docker.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: BullAPI

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bull
          POSTGRES_PASSWORD: bull
          POSTGRES_DB: bull_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bull"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Apply migrations to test database
        env:
          DATABASE_URL: postgres://bull:bull@localhost:5432/bull_test
        run: bun run db:migrate

      - name: Test (unit + Postgres integration)
        env:
          HYPER_SKIP_LISTEN: "1"
          JWT_SECRET: test-jwt-secret-at-least-32-bytes-long!!
          BULL_UPSTREAM_API_KEY: test-upstream-key
          TEST_DATABASE_URL: postgres://bull:bull@localhost:5432/bull_test
        run: bun test

  docker-build:
    name: Verify Docker image builds
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          # Root context so the Dockerfile can compile the bull-core sidecar
          # from Rust/core (kept in sync with bull-api-docker.yml).
          context: .
          file: BullAPI/Dockerfile
          push: false
          load: true
          tags: bull-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke container health (coach-only, no DB)
        env:
          JWT_SECRET: test-jwt-secret-at-least-32-bytes-long!!
          BULL_UPSTREAM_API_KEY: test-upstream-key
        run: |
          docker run -d --name bull-api-smoke -p 13000:3000 \
            -e JWT_SECRET \
            -e BULL_UPSTREAM_API_KEY \
            bull-api:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:13000/health | grep -q '"ok":true'; then
              echo "health ok"
              docker stop bull-api-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs bull-api-smoke
          docker stop bull-api-smoke
          exit 1
