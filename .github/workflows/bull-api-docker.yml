name: Bull API Docker Publish

# Builds and pushes the Bull API image to GitHub Container Registry (GHCR).
# Configure runtime secrets (JWT_SECRET, BULL_UPSTREAM_API_KEY, DATABASE_URL,
# S3_* for R2, APPLE_BUNDLE_ID, …) in your host platform — never bake them into
# the image.

on:
  push:
    branches: ["main"]
    paths:
      - "BullAPI/**"
      - ".github/workflows/bull-api-docker.yml"
    tags:
      - "bull-api-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional extra tag (e.g. staging)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bull-api

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/bull-api-v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/bull-api-v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: BullAPI
          file: BullAPI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate artifact attestation
        if: steps.build.outcome == 'success'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
